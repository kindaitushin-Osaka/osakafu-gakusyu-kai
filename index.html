<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ただいま準備中</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4ff;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .box {
      text-align: center;
      padding: 48px 32px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 12px; }
    p { color: #6b7280; line-height: 1.8; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🔧</div>
    <h1>ただいまメンテナンス中です</h1>
    <p>現在準備中です。<br>もうしばらくお待ちください。</p>
  </div>
</body>
</html>
